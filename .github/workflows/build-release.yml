name: build-release

on:
  push:
    branches:
      - main
      - master
    paths:
      - pubspec.yaml
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is missing"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
        env:
          SIGNING_STORE_FILE: release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG=${VERSION/+/-}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
      - run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s%n%b" > release_notes.txt
          else
            git log -5 --pretty=format:"- %s%n%b" > release_notes.txt
          fi
          if [ ! -s release_notes.txt ]; then
            echo "- ${GITHUB_SHA}" > release_notes.txt
          fi
      - run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk muses-v${VERSION}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk muses-v${VERSION}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk muses-v${VERSION}-x86_64.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TAG }}
          name: v${{ env.TAG }}
          body_path: release_notes.txt
          files: |
            muses-v${{ env.VERSION }}-arm64-v8a.apk
            muses-v${{ env.VERSION }}-armeabi-v7a.apk
            muses-v${{ env.VERSION }}-x86_64.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG=${VERSION/+/-}
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "TAG=$TAG" >> $env:GITHUB_ENV
      - run: dart run msix:create
      - run: |
          mv "build/windows/runner/Release/Muses.msix" "muses-v${env:VERSION}-x64.msix"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TAG }}
          name: v${{ env.TAG }}
          update_existing: true
          files: |
            muses-v${{ env.VERSION }}-x64.msix
